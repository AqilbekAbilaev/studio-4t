name: CI

# Runs the test suites on every PR into main (and on pushes to main) so a
# regression can't merge green. Release bundling lives in release.yml and is
# unaffected by this. Kept to Linux only for a fast, cheap gate — cross-platform
# build coverage already happens at release time.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  backend:
    name: Backend tests (cargo)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file

      - name: Run unit tests
        working-directory: ./src-tauri
        env:
          # IntelliShell's boa_engine needs a larger compile-time stack or rustc
          # can overflow while building it (mirrors release.yml).
          RUST_MIN_STACK: '16777216'
        run: cargo test
